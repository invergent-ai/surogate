# example_deepeval_target_judge.yaml

# Target model being evaluated
target:
  model: "Qwen/Qwen3-0.6B"
  api_url: "http://127.0.0.1:8888/v1"
  api_key: ""
  generation_config:
    temperature: 0.7
    max_tokens: 500

# Judge model for evaluation (using GPT-4o-mini for reliable structured outputs)
judge_model:
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  timeout: 180.0
  generation_config:
    temperature: 0.3
    max_tokens: 1000

# Evaluation metrics
metrics:
  - type: "answer_relevancy"
    threshold: 0.7

# Dataset and output
dataset: "./data/rag_eval_cases.json"
output: "./results/deepeval_target_judge.json"

# Optional: Strip thinking tags from target model outputs
strip_thinking_tags: true

# Optional: Control verbosity
verbose: true