# examples/eval/example_deepeval_with_target.yaml

# Target model being evaluated
target:
  model: "Qwen/Qwen3-0.6B"
  api_url: "http://127.0.0.1:8888/v1"
  api_key: ""
  generation_config:
    temperature: 0.7
    max_tokens: 500
    top_p: 0.9
    stop: ["<|endoftext|>"]

# Strip <think>...</think> tags from outputs (improves Answer Relevancy scores)
strip_thinking_tags: true

# Judge model for evaluation
judge_model:
  model: "gpt-4o-mini"
  api_key: "${OPENAI_API_KEY}"
  # api_url: "https://api.openai.com/v1"  # Optional for OpenAI
  # generation_config:  # Optional generation config for judge
  #   temperature: 0.3
  #   max_tokens: 1000
  #   top_p: 0.95

# Test cases - no need for actual_output, it will be generated from target model!
test_cases:
#  - input: "What is the capital of France?"
#    expected_output: "Paris"
#    retrieval_context: ["Paris is the capital and most populous city of France."]
    # context: ["France is a country in Europe."]  # Optional: additional context
    # actual_output: "Paris is the capital."  # Optional: provide pre-written output instead of generating

  - input: "Who wrote Romeo and Juliet?"
    expected_output: "William Shakespeare"
    retrieval_context: ["Romeo and Juliet is a tragedy written by William Shakespeare."]

  - input: "What is photosynthesis?"
    expected_output: "The process by which plants convert light into energy"
    retrieval_context: ["Photosynthesis is a process used by plants to convert light energy into chemical energy."]

# Alternative: Load test cases from external file
# dataset: "./data/rag_eval_cases.json"

# Evaluation metrics
metrics:
  - type: "answer_relevancy"
    threshold: 0.7
    # strict_mode: true  # Optional: stricter evaluation
    # include_reason: true  # Optional: include reasoning in results

  - type: "faithfulness"
    threshold: 0.8

  # Additional available metrics (uncomment to use):
  # - type: "contextual_recall"
  #   threshold: 0.7

  # - type: "contextual_precision"
  #   threshold: 0.7

  # - type: "contextual_relevancy"
  #   threshold: 0.7

  # - type: "hallucination"
  #   threshold: 0.3

  # - type: "summarization"
  #   threshold: 0.7

  # - type: "bias"
  #   threshold: 0.3

  # - type: "toxicity"
  #   threshold: 0.3

  # Custom G-Eval metric
  # - type: "g_eval"
  #   name: "Correctness"
  #   criteria: "Determine whether the actual output is factually correct based on the expected output."
  #   evaluation_params: ["Factuality", "Completeness", "Accuracy"]
  #   threshold: 0.5

# Output configuration
output: "./results/deepeval_with_target.json"

# Verbose output control (shows DeepEval's progress bars and logs)
verbose: true

# Confident AI integration (for viewing and uploading results)
confident_ai:
  # Show prompts for local viewing (no API key needed)
  show_prompts: false

  # Upload results to Confident AI cloud (requires API key)
  # api_key: "${CONFIDENT_AI_API_KEY}"