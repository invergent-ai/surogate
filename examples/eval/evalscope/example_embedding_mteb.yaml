# example_embedding_mteb.yaml
target:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  pooling_mode: "mean"
  max_seq_length: 512
  encode_kwargs:
    batch_size: 64
    normalize_embeddings: true

embedding_reranker_eval:
  enabled: true
  tool: "MTEB"
  tasks:
    - "TNews"
    - "ATEC"
    - "T2Retrieval"
  limits: 500
  verbosity: 2
  hub: "modelscope"

output:
  dir: "./results/embedding"