# GRPO Orchestrator Example

model:
  name: "surogate/Qwen3.5-0.8B-FP8"
  lora_adapter: "default"
  lora_rank: 16
  lora_alpha: 32

env:
  - id: reverse-text

batch_size: 128
rollouts_per_example: 16
seq_len: 2048
max_steps: 20

sampling:
  max_tokens: 128

client:
  base_url: 
    - http://localhost:8007/v1