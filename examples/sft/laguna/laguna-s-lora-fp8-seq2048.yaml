# Laguna-S 117B SFT at sequence length 2048 on 8x RTX 5090 (32 GB) via
# KV-checkpointed chunked-sequence training: the layer stack runs over
# 256-token chunks with attention KV carried across chunks, so memory stays
# at the single-chunk footprint (~22 GB/rank) while gradients remain exact
# (reverse-order backward with FP32 dK/dV accumulation). Trailing all-padding
# chunks are skipped automatically. LLEP keeps the routing-hot rank's VRAM
# balanced; sample packing is not supported with chunking yet.
model: poolside/Laguna-S-2.1
output_dir: ./output_laguna_s_2048

per_device_train_batch_size: 1
gradient_accumulation_steps: 1
gpus: 8
cpu_training: true
ep_size: 8
ep_load_balance_threshold: 1.3
offload_residual: true

sample_packing: false
sequence_len: 2048
sequence_chunks: 8

max_steps: 1000
eval_steps: 100
learning_rate: 2e-4

recipe: fp8-hybrid
lmhead_chunks: 8

lora: true
lora_rank: 16
lora_alpha: 32
lora_dtype: bf16

lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
