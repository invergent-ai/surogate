model: meta-llama/Llama-3.2-1B
model_type: llama3_2

save_path: ./output
merge_adapter: false

apply_recommended_values: false

per_device_train_batch_size: 2
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 2048

max_steps: 30

learning_rate: 2e-4

qlora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - all-linear

datasets:
  - path: "mlabonne/FineTome-100k"
    samples: 100
    type: auto


