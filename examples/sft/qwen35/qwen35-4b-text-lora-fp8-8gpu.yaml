# Qwen3.5-4B LoRA SFT, fp8-hybrid, all 8 GPUs — sustained-load thermal test.
# max_steps sized for a ~10-15 min soak (dataset cycles epochs); stop early once
# temperatures plateau.
model: Qwen/Qwen3.5-4B
output_dir: ./output_q35_4b_heat

per_device_train_batch_size: 2
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 2048
gpus: 8

max_steps: 500
eval_steps: 0

learning_rate: 2e-4
warmup_ratio: 0.15

recipe: fp8-hybrid

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
