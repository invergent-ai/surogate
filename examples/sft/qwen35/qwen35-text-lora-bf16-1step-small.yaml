model: Qwen/Qwen3.5-0.8B
output_dir: ./output_q35

per_device_train_batch_size: 1
gradient_accumulation_steps: 1

sample_packing: true
sequence_len: 512

max_steps: 1
eval_steps: 0

learning_rate: 2e-4
warmup_ratio: 0.15

recipe: bf16

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
