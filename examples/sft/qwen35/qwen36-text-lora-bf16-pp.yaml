# Dispatch Pipeline Parallelism (dispatch-PP) — single-node, model-parallel LoRA.
#
model: Qwen/Qwen3.6-27B
output_dir: ./output_q36

# Size of the round-robin GPU pool. Set to your box's GPU count. The layers are split
# into many SMALL stages
gpus: 4

per_device_train_batch_size: 1
# The microbatch count for dispatch-PP (LoRA): a step runs M = gpus * gradient_accumulation_steps
# microbatches, all accumulated into ONE optimizer step (effective batch gpus*bsz*GA).
gradient_accumulation_steps: 8

sample_packing: true
sequence_len: 2048

max_steps: 10
eval_steps: 25

learning_rate: 1e-4
warmup_ratio: 0.15

recipe: fp8_hybrid

# Opt-in model-parallel mode. Mutually exclusive with ZeRO sharding / cpu_training /
# MoE-EP; CUDA graphs are auto-disabled (per-stage weight streaming can't be captured).
parallelism: dispatch_pp

# Stream the frozen base weights from pinned CPU per block. Required when the base
# model can't fit resident on a single GPU (e.g. a 27B on 32 GB cards). Drop it for
# models that fit resident — the same stage scheduler runs either way.
offload_master: true

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
