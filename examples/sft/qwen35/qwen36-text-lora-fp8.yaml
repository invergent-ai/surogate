model: Qwen/Qwen3.6-27B-FP8
output_dir: ./output_q36

per_device_train_batch_size: 1
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 1024

max_steps: 5
eval_steps: 25

learning_rate: 2e-4
warmup_ratio: 0.15

recipe: fp8-hybrid
cpu_training: true

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
