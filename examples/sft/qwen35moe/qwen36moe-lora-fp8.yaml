model: Qwen/Qwen3.6-35B-A3B
output_dir: ./output_35_moe

per_device_train_batch_size: 1
gradient_accumulation_steps: 4

gpus: 4
ep_size: 4

sample_packing: true
sequence_len: 2048

max_steps: 50
eval_steps: 25
learning_rate: 5e-5
warmup_ratio: 0.1

recipe: fp8-hybrid
lmhead_chunks: 8

lora: true
lora_rank: 16
lora_alpha: 32
lora_dtype: bf16

train_router: false
router_aux_loss_coef: 0.01
router_z_loss_coef: 0.001

qlora_offload_experts: false
cpu_training: true
# recompute (on by default) bounds per-layer activations; offload_residual moves the
# per-layer residual checkpoints to pinned CPU so total activation memory is independent
# of depth — needed here, the OOM was a late-layer (op ~1738) backward saved-tensor.
offload_residual: true

lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
