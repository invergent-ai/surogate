primary:
  service:
    type: NodePort
    nodePorts:
      postgresql: 32432
  initdb:
    scripts:
      create-dstack.sql: |
        CREATE USER dstack WITH PASSWORD 'dstack';
        CREATE DATABASE dstack OWNER dstack;
      create-surogate.sql: |
        CREATE USER surogate WITH PASSWORD 'surogate';
        CREATE DATABASE surogate OWNER surogate;
      create-surogates.sql: |
        CREATE USER surogates WITH PASSWORD 'surogates';
        CREATE DATABASE surogates OWNER surogates;
