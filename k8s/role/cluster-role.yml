apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dstack-backend
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "create"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "create", "delete", "list"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "create", "delete"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list", "get"]
  